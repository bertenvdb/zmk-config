# Dongle (central) — only applied to sofle_dongle build

# Dongle has no RGB LEDs
CONFIG_ZMK_RGB_UNDERGLOW=n

# Dongle has no encoders
CONFIG_EC11=n

# ── ZMK Studio ───────────────────────────────────────────────────────────────
# Studio runs on the dongle (USB central) only; peripherals must NOT enable it
# as extra GATT services and BLE transport overhead cause the right half to drop
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n

# ── Prospector display ────────────────────────────────────────────────────────
CONFIG_PROSPECTOR_USE_AMBIENT_LIGHT_SENSOR=n
CONFIG_PROSPECTOR_FIXED_BRIGHTNESS=80
CONFIG_PROSPECTOR_STATUS_SCREEN_OPERATOR=y
