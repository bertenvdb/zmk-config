# Uncomment the following line to enable the Sofle OLED Display
CONFIG_ZMK_DISPLAY=y

# Uncomment these two lines to add support for encoders
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Uncomment this line below to add rgb underglow / backlight support
CONFIG_ZMK_RGB_UNDERGLOW=y

# RGB underglow start values
CONFIG_ZMK_RGB_UNDERGLOW_HUE_START=305
CONFIG_ZMK_RGB_UNDERGLOW_SAT_START=100
CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=100

# Uncomment the line below to disable external power toggling by the underglow.
# By default toggling the underglow on and off also toggles external power
# on and off. This also causes the display to turn off.
# CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=n

# ========================================
# zmk-nice-oled OLED Display Configuration
# ========================================

# General Display Settings
# -------------------------
# Enable custom status screen (required for zmk-nice-oled)
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y

# Enable nice_oled widget compatibility
CONFIG_NICE_OLED_ON=y

# Dedicated work queue for better display performance
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y

# Sleep & Idle Settings
# ---------------------
# Enable sleep art when display goes idle
CONFIG_NICE_OLED_SHOW_SLEEP_ART_ON_IDLE=y

# Status Widgets (Both Sides)
# ----------------------------
# Show battery status and connection mode on both central and peripheral
CONFIG_NICE_OLED_WIDGET_STATUS=y

# Central (Left Side) Widgets
# ----------------------------
# Enable layer display widget on central side
CONFIG_NICE_OLED_WIDGET_LAYER=y

# Enable WPM (words per minute) widget on central side
CONFIG_NICE_OLED_WIDGET_WPM=y

# Show numeric WPM value on central display
CONFIG_NICE_OLED_WIDGET_WPM_NUMBER=y

# Peripheral (Right Side) Widgets
# --------------------------------
# Enable WPM widget on peripheral side
CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_WPM=y

# Enable animations on peripheral side
CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL=y

# Enable smart battery animation on peripheral side
CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_SMART_BATTERY=y

# Enable spaceman animation on peripheral side
CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_SPACEMAN=y

# HID Indicators
# --------------
# Enable HID indicators (Caps Lock, Num Lock, etc.)
CONFIG_NICE_OLED_WIDGET_HID_INDICATORS=y

# Enable core ZMK HID indicators support (required for HID indicators)
CONFIG_ZMK_HID_INDICATORS=y

# ========================================
# End OLED Configuration
# ========================================

CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n
