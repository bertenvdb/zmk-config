name: Draw Keymap Visualization

on:
  push:
    branches:
      - main
    paths:
      - 'config/*.keymap'
      - '.github/workflows/draw-keymap.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  draw-keymap:
    uses: caksoylar/keymap-drawer/.github/workflows/draw-zmk.yml@main
    with:
      keymap_patterns: 'config/sofle.keymap'
      output_folder: keymap-drawer
      destination: artifact
      artifact_name: sofle-keymap

  rename-and-commit:
    needs: draw-keymap
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: sofle-keymap
          path: .

      - name: Debug - Show downloaded files
        run: |
          echo "=== Current directory ==="
          ls -la
          echo ""
          echo "=== All files (recursive) ==="
          find . -type f -name "*.svg" 2>/dev/null || echo "No SVG files found"
          echo ""
          echo "=== All files in current dir ==="
          find . -type f 2>/dev/null | head -20

      - name: Find and rename visualization
        run: |
          # Find the SVG file anywhere in the downloaded artifact
          SVG_FILE=$(find . -type f -name "*.svg" 2>/dev/null | head -1)
          
          if [ -z "$SVG_FILE" ]; then
            echo "ERROR: No SVG file found in artifact"
            exit 1
          fi
          
          echo "Found SVG file: $SVG_FILE"
          mv "$SVG_FILE" keymap-visualization.svg
          echo "Renamed to keymap-visualization.svg"

      - name: Commit and push visualization
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add keymap-visualization.svg
          git diff --staged --quiet || git commit -m "Update keymap visualization"
          git push
