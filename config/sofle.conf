# Uncomment the following line to enable the Sofle OLED Display
CONFIG_ZMK_DISPLAY=y

# Uncomment these two lines to add support for encoders
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Uncomment this line below to add rgb underglow / backlight support
CONFIG_ZMK_RGB_UNDERGLOW=y

# RGB underglow start values
CONFIG_ZMK_RGB_UNDERGLOW_HUE_START=305
CONFIG_ZMK_RGB_UNDERGLOW_SAT_START=100
CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=100

# Uncomment the line below to disable external power toggling by the underglow.
# By default toggling the underglow on and off also toggles external power
# on and off. This also causes the display to turn off.
# CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=n

# BLE experimental connection to resolve random peripheral disconnecting
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# ========================================
# zmk-nice-oled OLED Display Configuration
# ========================================

# General Display Settings
# -------------------------
# Enable custom status screen (required for zmk-nice-oled)
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y

# Enable nice_oled widget compatibility
CONFIG_NICE_OLED_ON=y

# Dedicated work queue for better display performance
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y

# Display rotation for vertically mounted OLED displays
# Rotate display 90 degrees clockwise to correct vertical mounting orientation
# Note: CONFIG_LV_DISPLAY_ROTATION_90 is not a valid ZMK Kconfig symbol.
# Display rotation should be configured via devicetree overlay if needed.
# CONFIG_LV_DISPLAY_ROTATION_90=y

# Sleep & Idle Settings
# ---------------------
# Enable sleep art when display goes idle
CONFIG_NICE_OLED_SHOW_SLEEP_ART_ON_IDLE=y

# Display blanking configuration (CRITICAL for sleep/wake functionality)
# Enable automatic display blanking when keyboard is idle
# Without this, displays may sleep but fail to wake up properly
CONFIG_ZMK_DISPLAY_BLANK_ON_IDLE=y

# Idle timeout before display blanks (milliseconds)
# Default: 600000ms (10 minutes)
# Adjust this value to control how quickly the display goes to sleep
CONFIG_ZMK_IDLE_TIMEOUT=600000

# Enable deep sleep mode for power savings
CONFIG_ZMK_SLEEP=y

# Time before entering deep sleep (milliseconds)
# Default: 900000ms (15 minutes)
# After this duration of inactivity, keyboard enters deep sleep
# Note: CONFIG_ZMK_SLEEP_TIMEOUT is not a valid ZMK Kconfig symbol.
# Use CONFIG_ZMK_IDLE_SLEEP_TIMEOUT instead if deep sleep timeout configuration is needed.
# CONFIG_ZMK_SLEEP_TIMEOUT=900000

# Display invert setting for OLED stability
# Some OLED displays show garbled pixels after power cycling
# Setting to 'n' ensures normal display mode and can improve stability
CONFIG_ZMK_DISPLAY_INVERT=n

# Status Widgets (Both Sides)
# ----------------------------
# Show battery status and connection mode on both central and peripheral
CONFIG_NICE_OLED_WIDGET_STATUS=y

# Central (Left Side) Widgets
# ----------------------------
# Enable layer display widget on central side
CONFIG_NICE_OLED_WIDGET_LAYER=y

# WPM (words per minute) widget enabled on central side
CONFIG_NICE_OLED_WIDGET_WPM=y

# Numeric WPM value enabled (displays actual WPM number)
CONFIG_NICE_OLED_WIDGET_WPM_NUMBER=y

# Peripheral (Right Side) Widgets
# --------------------------------
# WPM widget disabled on peripheral - requires keycode events only available on central side
# Peripheral side only sends raw key matrix events; enabling this causes linker errors:
# "undefined reference to `as_zmk_keycode_state_changed'" and similar
# CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_WPM=y

# Enable animations on peripheral side
CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL=y

# Enable smart battery animation on peripheral side
CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_SMART_BATTERY=y

# Disable gem animation on peripheral side (explicit disable to prevent default behavior)
# The gem animation may be enabled by default in zmk-nice-oled
CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_GEM=n

# Enable spaceman animation on peripheral side
CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_SPACEMAN=y

# HID Indicators
# --------------
# Enable HID indicators (Caps Lock, Num Lock, etc.)
CONFIG_NICE_OLED_WIDGET_HID_INDICATORS=y

# Enable core ZMK HID indicators support (required for HID indicators)
CONFIG_ZMK_HID_INDICATORS=y

# Modifier Indicator Symbols
# ---------------------------
# Controls which OS symbol style is used for modifier keys (Ctrl, Alt, Win/Cmd, Shift)
# on the OLED display. Choose between macOS-style or Windows-style symbols.
CONFIG_NICE_OLED_WIDGET_MODIFIERS_INDICATORS_FIXED_SYMBOL_MACOS=n
CONFIG_NICE_OLED_WIDGET_MODIFIERS_INDICATORS_FIXED_SYMBOL_WINDOWS=y

# ========================================
# End OLED Configuration
# ========================================

CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n
