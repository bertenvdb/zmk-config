# Dongle (central) — only applied to sofle_dongle build

# Dongle has no RGB LEDs
CONFIG_ZMK_RGB_UNDERGLOW=n

# Dongle has no encoders
CONFIG_EC11=n

# ── Prospector display ────────────────────────────────────────────────────────
# No ambient light sensor on this build
CONFIG_PROSPECTOR_USE_AMBIENT_LIGHT_SENSOR=n
CONFIG_PROSPECTOR_FIXED_BRIGHTNESS=80

# ── Disable nice_oled (dongle uses Prospector display, not SSD1306) ──────────
CONFIG_NICE_OLED_ON=n
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=n
